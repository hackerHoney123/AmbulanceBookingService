<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
{% load static %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

<div class="container" id="container">

<div class="form-container sign-up-container">
<form method="POST" action="{% url 'signup' %}">
{% csrf_token %}
<h1>Create Account</h1>
<input type="text" name="username" placeholder="Name" required />
<input type="email" name="email" placeholder="Email" required />
<input type="password" name="password" placeholder="Password" required />
<div class="role-picker">
<label class="role-option">
<input type="radio" name="role" value="patient" checked>
<span>Patient</span>
</label>
<label class="role-option">
<input type="radio" name="role" value="driver">
<span>Driver</span>
</label>
</div>
<div id="driverFields" style="width: 100%; display: none;">
<input type="text" name="phone" placeholder="Driver Phone" />
<input type="text" name="vehicle_number" placeholder="Vehicle Number" />
<input type="text" name="current_location" placeholder="Current Location" />
</div>
<button type="submit">Sign Up</button>
</form>
</div>

<div class="form-container sign-in-container">
<form method="POST" action="{% url 'login' %}">
{% csrf_token %}
<h1>Sign in</h1>
<p class="signin-note">Just enter your username/email and password. Your dashboard opens automatically.</p>
<input type="email" name="email" placeholder="Email" required />
<input type="password" name="password" placeholder="Password" required />
<button type="submit">Sign In</button>
</form>
</div>

<div class="overlay-container">
<div class="overlay">

<div class="overlay-panel overlay-left">
<h1>Welcome Back!</h1>
<p>To keep connected please login</p>
<button class="ghost" id="signIn">Sign In</button>
</div>

<div class="overlay-panel overlay-right">
<h1>sign up!</h1>
<p>Enter your details and start journey</p>
<button class="ghost" id="signUp">Sign Up</button>
</div>

</div>
</div>

</div>

<script src="{% static 'js/login.js' %}"></script>

</body>
</html>
